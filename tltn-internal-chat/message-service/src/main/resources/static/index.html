<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spring STOMP Chat Client</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --surface-color: #1e293b;
            --border-color: #334155;
            --primary-accent: #38bdf8;
            --primary-hover: #0284c7;
            --text-main: #f8fafc;
            --text-secondary: #94a3b8;
            --msg-sent: #0ea5e9;
            --msg-received: #334155;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            display: flex;
            width: 90%;
            max-width: 1200px;
            height: 85vh;
            background-color: var(--surface-color);
            border-radius: 16px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .sidebar {
            width: 320px;
            background-color: #121a2b;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            border-right: 1px solid var(--border-color);
        }

        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--surface-color);
        }

        h2 {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--primary-accent);
            margin-bottom: 8px;
        }

        label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 4px;
            display: block;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            border-radius: 8px;
            outline: none;
            transition: all 0.2s ease;
        }

        input:focus {
            border-color: var(--primary-accent);
            box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.1);
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:disabled {
            background-color: var(--border-color);
            color: var(--text-secondary);
            cursor: not-allowed;
        }

        .status {
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-weight: 600;
            font-size: 0.9rem;
            background-color: #ef444420;
            color: #ef4444;
            transition: all 0.3s;
        }

        .status.connected {
            background-color: #10b98120;
            color: #10b981;
        }

        .chat-header {
            padding: 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .messages-container {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            max-width: 70%;
            padding: 12px 18px;
            border-radius: 18px;
            line-height: 1.5;
            position: relative;
            animation: fadeIn 0.3s ease forwards;
            opacity: 0;
            transform: translateY(10px);
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .msg-other {
            align-self: flex-start;
            background-color: var(--msg-received);
            border-bottom-left-radius: 4px;
        }

        .msg-self {
            align-self: flex-end;
            background-color: var(--msg-sent);
            border-bottom-right-radius: 4px;
        }

        .msg-header {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }
        
        .msg-self .msg-header {
            color: #e0f2fe;
            text-align: right;
        }

        .chat-input {
            padding: 24px;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 12px;
        }

        .chat-input input {
            flex: 1;
        }

        .chat-input button {
            width: auto;
            padding: 0 24px;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Sidebar limits for configuring simulation -->
        <div class="sidebar">
            <div class="branding">
                <h2>Message Service API Testing Client</h2>
                <div id="connectionStatus" class="status">Disconnected</div>
            </div>
            
            <div class="config-block">
                <label>Your User ID:</label>
                <input type="text" id="senderId" placeholder="user_123" value="user_alice">
            </div>

            <div class="config-block">
                <label>Recipient ID (For 1-on-1):</label>
                <input type="text" id="recipientId" placeholder="user_456" value="user_bob">
            </div>
            
            <div class="config-block" style="margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border-color);">
                <label>Listen to Conversation ID:</label>
                <input type="text" id="topicId" placeholder="After sending, enter ID here">
            </div>

            <button id="connectBtn" onclick="connect()">Connect WebSockets</button>
            <button id="subBtn" onclick="subscribeToConversation()" disabled style="background-color: #10b981;">Subscribe to ID</button>
        </div>

        <div class="main-chat">
            <div class="chat-header">
                <div>
                    <h3 id="chatTitle">Live Feed</h3>
                    <p style="color: var(--text-secondary); font-size: 0.85rem;" id="chatSubtitle">Disconnected from network.</p>
                </div>
            </div>

            <div class="messages-container" id="messagesArea">
                <!-- Messages will appear here -->
            </div>

            <div class="chat-input" id="chatInputArea" style="opacity: 0.5; pointer-events: none;">
                <input type="text" id="messageInput" placeholder="Type a message to initiate or reply..." onkeypress="handleEnter(event)">
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <script>
        let stompClient = null;
        let currentSubscription = null;
        let myId = "";

        function connect() {
            const socket = new SockJS('/ws');
            stompClient = Stomp.over(socket);
            
            myId = document.getElementById('senderId').value;
            
            // If you need auth in STOMP headers:
            // const headers = { 'Authorization': 'Bearer test-token' };
            stompClient.connect({}, function (frame) {
                console.log('Connected: ' + frame);
                
                const statusEl = document.getElementById('connectionStatus');
                statusEl.textContent = 'Connected';
                statusEl.className = 'status connected';
                
                document.getElementById('chatInputArea').style.opacity = '1';
                document.getElementById('chatInputArea').style.pointerEvents = 'all';
                document.getElementById('chatSubtitle').textContent = 'Socket active. Initiating new chat or subscribing requires sending a payload.';
                document.getElementById('connectBtn').disabled = true;
                document.getElementById('subBtn').disabled = false;
                
            }, function(error) {
                console.error("Connection error: ", error);
                const statusEl = document.getElementById('connectionStatus');
                statusEl.textContent = 'Connection Failed';
                statusEl.className = 'status';
            });
        }

        function subscribeToConversation() {
            const conversationId = document.getElementById('topicId').value;
            if (!conversationId) {
                alert("Please enter a conversation ID to subscribe to.");
                return;
            }

            if (currentSubscription) {
                currentSubscription.unsubscribe();
            }

            document.getElementById('chatSubtitle').textContent = `Listening to /topic/conversation/${conversationId}`;
            
            currentSubscription = stompClient.subscribe(`/topic/conversation/${conversationId}`, function (messageOutput) {
                const messageObj = JSON.parse(messageOutput.body);
                showMessage(messageObj);
                
                // Automatically populate the topicID if not populated yet
                if(document.getElementById('topicId').value !== messageObj.conversationId) {
                     document.getElementById('topicId').value = messageObj.conversationId;
                }
            });
            console.log("Subscribed to conversation: ", conversationId);
        }

        function sendMessage() {
            const sender = document.getElementById('senderId').value;
            const recipient = document.getElementById('recipientId').value;
            const content = document.getElementById('messageInput').value;
            const convId = document.getElementById('topicId').value;

            if (content && stompClient) {
                const chatMessage = {
                    senderId: sender,
                    recipientId: recipient ? recipient : null,
                    conversationId: convId ? convId : null,
                    content: content,
                    type: 'TEXT'
                };
                
                stompClient.send("/app/chat.send", {}, JSON.stringify(chatMessage));
                document.getElementById('messageInput').value = '';
                
                // Keep the same logic, await the broadcast to render it locally!
            }
        }

        function showMessage(messageObj) {
            const messagesArea = document.getElementById('messagesArea');
            const messageElement = document.createElement('div');
            
            const isSelf = messageObj.senderId === myId;
            messageElement.className = `message ${isSelf ? 'msg-self' : 'msg-other'}`;
            
            const timeStr = new Date(messageObj.timestamp).toLocaleTimeString();
            messageElement.innerHTML = `
                <div class="msg-header">${messageObj.senderId} • ${timeStr}</div>
                <div>${messageObj.content}</div>
            `;
            
            messagesArea.appendChild(messageElement);
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        function handleEnter(event) {
            if (event.key === "Enter") {
                sendMessage();
            }
        }
    </script>
</body>
</html>
